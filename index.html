<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets & Liabilities Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* PIN SCREEN */
        .pin-screen {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .pin-screen h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 10px;
        }

        .pin-screen p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .pin-input-container {
            margin-bottom: 30px;
        }

        .pin-input {
            font-size: 24px;
            letter-spacing: 8px;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            text-align: center;
            width: 100%;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .pin-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .pin-input.error {
            border-color: #ef4444;
            animation: shake 0.4s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .pin-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .pin-button:hover {
            transform: scale(1.02);
        }

        .pin-button:active {
            transform: scale(0.98);
        }

        .pin-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            min-height: 20px;
        }

        /* MAIN APP */
        .app-container {
            display: none;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .app-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .app-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .logout-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .app-content {
            padding: 30px;
            display: block;
            max-width: 800px;
            margin: 0 auto;
        }

        @media (max-width: 768px) {
            .app-content {
                padding: 20px;
            }
        }

        .form-section {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            background: #f9fafb;
        }

        .form-section h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #333;
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .add-btn:hover {
            transform: scale(1.02);
        }

        .summary-section {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #d4d9f0;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #d4d9f0;
            font-size: 14px;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-item strong {
            color: #333;
        }

        .summary-item .amount {
            font-weight: 600;
        }

        .assets-amount {
            color: #16a34a;
        }

        .liabilities-amount {
            color: #dc2626;
        }

        .net-worth {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #d4d9f0;
            background: white;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
        }

        .net-worth-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .items-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .item {
            background: white;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #667eea;
            font-size: 14px;
        }

        .item.liability {
            border-left-color: #dc2626;
        }

        .item-info {
            flex: 1;
        }

        .item-name {
            font-weight: 600;
            color: #333;
        }

        .item-amount {
            color: #666;
            font-size: 13px;
            margin-top: 2px;
        }

        .delete-btn {
            background: transparent;
            color: #dc2626;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 300;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .delete-btn:hover {
            opacity: 1;
            color: #991b1b;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #999;
            font-size: 14px;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f4f6;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14px;
            text-align: center;
        }

        .message.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        /* FLOATING ACTION BUTTON */
        .fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .fab:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 28px rgba(102, 126, 234, 0.6);
        }

        .fab:active {
            transform: scale(0.95);
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 28px;
            color: #999;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        /* LEDGER STYLING */
        .ledger-section {
            margin-bottom: 30px;
        }

        .ledger-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .ledger-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f9fafb;
            border-bottom: 1px solid #e5e7eb;
            font-size: 14px;
        }

        .ledger-item:last-child {
            border-bottom: none;
            border-radius: 0 0 8px 8px;
        }

        .ledger-item:first-child {
            border-radius: 8px 8px 0 0;
        }

        .ledger-name {
            font-weight: 500;
            color: #333;
        }

        .ledger-amount {
            font-weight: 600;
            color: #667eea;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .ledger-item.liability .ledger-amount {
            color: #dc2626;
        }

        /* SUMMARY CARDS */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (max-width: 600px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }
        }

        .summary-card {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .summary-card-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .summary-card-value {
            font-size: 28px;
            font-weight: 700;
            color: #333;
        }

        .summary-card.assets .summary-card-value {
            color: #16a34a;
        }

        .summary-card.liabilities .summary-card-value {
            color: #dc2626;
        }

        .summary-card.networth .summary-card-value {
            color: #667eea;
        }
    </style>
</head>
<body>
    <!-- PIN SCREEN -->
    <div class="pin-screen" id="pinScreen">
        <h1>🔐 Unlock</h1>
        <p>Enter your PIN to access your assets</p>
        <div class="pin-input-container">
            <input type="password" id="pinInput" class="pin-input" placeholder="••••" maxlength="4" inputmode="numeric">
        </div>
        <button class="pin-button" onclick="checkPin()">Unlock</button>
        <div class="pin-error" id="pinError"></div>
    </div>

    <!-- MAIN APP -->
    <div class="app-container" id="appContainer">
        <button class="logout-btn" onclick="logout()">Logout</button>
        
        <div class="app-header">
            <h1>💰 Assets & Liabilities</h1>
            <p>Track your financial position</p>
        </div>

        <div class="app-content">
            <!-- SUMMARY CARDS -->
            <div class="summary-cards">
                <div class="summary-card assets">
                    <div class="summary-card-label">Total Assets</div>
                    <div class="summary-card-value" id="totalAssets">$0.00</div>
                </div>
                <div class="summary-card liabilities">
                    <div class="summary-card-label">Total Liabilities</div>
                    <div class="summary-card-value" id="totalLiabilities">$0.00</div>
                </div>
                <div class="summary-card networth" style="grid-column: 1 / -1;">
                    <div class="summary-card-label">Net Worth</div>
                    <div class="summary-card-value" id="netWorth">$0.00</div>
                </div>
            </div>

            <!-- MESSAGE -->
            <div id="message"></div>

            <!-- LEDGER VIEW -->
            <div class="ledger-section">
                <h3>📈 Assets</h3>
                <div id="assetsList"></div>
            </div>

            <div class="ledger-section">
                <h3>📉 Liabilities</h3>
                <div id="liabilitiesList"></div>
            </div>
        </div>

        <!-- FLOATING ACTION BUTTON -->
        <button class="fab" onclick="openModal()" title="Add Entry">+</button>

        <!-- ADD ENTRY MODAL -->
        <div class="modal" id="addModal">
            <div class="modal-content">
                <div class="modal-header">
                    <span>➕ Add Entry</span>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="itemName" placeholder="e.g., Savings Account">
                </div>

                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="itemAmount" placeholder="0.00" step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label>Type</label>
                    <select id="itemType">
                        <option value="asset">Asset</option>
                        <option value="liability">Liability</option>
                    </select>
                </div>

                <button class="add-btn" onclick="addItemAndClose()">Add Entry</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATVgByZ97lJTZWv18FbCrAryPOXeO0JZ4",
            authDomain: "assets-8cc78.firebaseapp.com",
            projectId: "assets-8cc78",
            storageBucket: "assets-8cc78.firebasestorage.app",
            messagingSenderId: "981433426082",
            appId: "1:981433426082:web:cb1c5e4c817b8fe8e4f7fb",
            measurementId: "G-NXZBRW1X1B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make functions global
        window.checkPin = checkPin;
        window.logout = logout;
        window.addItem = addItem;
        window.deleteItem = deleteItem;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.addItemAndClose = addItemAndClose;

        let isAuthenticated = false;
        let userItems = [];

        // MODAL FUNCTIONS
        function openModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('itemName').focus();
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            document.getElementById('itemType').value = 'asset';
        }

        function addItemAndClose() {
            addItem();
            if (!document.getElementById('message').textContent.includes('Error')) {
                closeModal();
            }
        }

        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // PIN CHECK
        async function checkPin() {
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pinError');
            const pin = pinInput.value;

            if (pin !== '3270') {
                pinInput.classList.add('error');
                pinError.textContent = 'Incorrect PIN. Try again.';
                pinInput.value = '';
                setTimeout(() => {
                    pinInput.classList.remove('error');
                }, 400);
                return;
            }

            isAuthenticated = true;
            pinError.textContent = '';
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'block';
            loadItems();
        }

        // LOGOUT
        function logout() {
            isAuthenticated = false;
            document.getElementById('pinScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('pinInput').value = '';
            userItems = [];
            document.getElementById('itemsList').innerHTML = '';
        }

        // ADD ITEM
        async function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const amount = parseFloat(document.getElementById('itemAmount').value);
            const type = document.getElementById('itemType').value;
            const messageDiv = document.getElementById('message');

            if (!name || isNaN(amount) || amount < 0) {
                messageDiv.innerHTML = '<div class="message error">Please fill in all fields correctly</div>';
                return;
            }

            try {
                const docRef = await addDoc(collection(db, 'items'), {
                    name,
                    amount,
                    type,
                    timestamp: new Date(),
                    userId: 'default-user' // Using default user since no auth
                });

                userItems.push({ id: docRef.id, name, amount, type });
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemAmount').value = '';
                messageDiv.innerHTML = '<div class="message success">✓ Entry added successfully</div>';
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 2000);

                updateUI();
            } catch (error) {
                messageDiv.innerHTML = '<div class="message error">Error adding entry. Try again.</div>';
                console.error('Error:', error);
            }
        }

        // DELETE ITEM
        async function deleteItem(id) {
            try {
                await deleteDoc(doc(db, 'items', id));
                userItems = userItems.filter(item => item.id !== id);
                updateUI();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // LOAD ITEMS
        async function loadItems() {
            try {
                const q = query(collection(db, 'items'), where('userId', '==', 'default-user'));
                const querySnapshot = await getDocs(q);
                userItems = [];
                querySnapshot.forEach((doc) => {
                    userItems.push({ id: doc.id, ...doc.data() });
                });
                updateUI();
            } catch (error) {
                console.error('Error loading items:', error);
            }
        }

        // UPDATE UI
        function updateUI() {
            const assetsList = document.getElementById('assetsList');
            const liabilitiesList = document.getElementById('liabilitiesList');
            
            // Filter and sort by amount (highest first)
            const assets = userItems
                .filter(item => item.type === 'asset')
                .sort((a, b) => b.amount - a.amount);
            const liabilities = userItems
                .filter(item => item.type === 'liability')
                .sort((a, b) => b.amount - a.amount);

            const totalAssets = assets.reduce((sum, item) => sum + item.amount, 0);
            const totalLiabilities = liabilities.reduce((sum, item) => sum + item.amount, 0);
            const netWorth = totalAssets - totalLiabilities;

            // Update summary
            document.getElementById('totalAssets').textContent = `$${totalAssets.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('totalLiabilities').textContent = `$${totalLiabilities.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('netWorth').textContent = `$${netWorth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            // Update assets list
            if (assets.length === 0) {
                assetsList.innerHTML = '<div class="empty-state">No assets yet</div>';
            } else {
                assetsList.innerHTML = assets.map(item => `
                    <div class="ledger-item">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }

            // Update liabilities list
            if (liabilities.length === 0) {
                liabilitiesList.innerHTML = '<div class="empty-state">No liabilities yet</div>';
            } else {
                liabilitiesList.innerHTML = liabilities.map(item => `
                    <div class="ledger-item liability">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Allow Enter key on PIN input
        document.getElementById('pinInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPin();
        });

        // Modal keyboard events
        document.getElementById('itemName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('itemAmount').focus();
        });

        document.getElementById('itemAmount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItemAndClose();
        });

        // Escape key closes modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
