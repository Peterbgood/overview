<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets & Liabilities Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
        }

        .app-content {
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-gutter: stable;
        }

        /* Fix scrollbar issue with stable gutter */
        .scrollable-content {
            scrollbar-gutter: stable;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* SCROLL BAR STYLING */
        .scrollable-content::-webkit-scrollbar {
            width: 8px;
        }

        .scrollable-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .scrollable-content::-webkit-scrollbar-thumb {
            background: #d1d5db;
            border-radius: 4px;
        }

        .scrollable-content::-webkit-scrollbar-thumb:hover {
            background: #9ca3af;
        }

        /* PIN SCREEN ANIMATIONS */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .shake-animation {
            animation: shake 0.4s ease;
        }

        .pin-dot {
            transition: all 0.2s ease;
        }

        .pin-dot.filled {
            transform: scale(1.1);
            background: #1d1d1f !important;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100">
    <!-- PIN SCREEN -->
    <div id="pinScreen" style="display: flex;" class="pin-screen fixed inset-0 flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100">
        <div class="w-full max-w-sm mx-auto px-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 md:p-12">
                <h1 class="text-4xl font-black text-slate-900 mb-2 tracking-tight">Secure Access</h1>
                <p class="text-slate-500 text-base mb-8">Enter your 4-digit PIN</p>
                
                <!-- PIN DOTS -->
                <div class="flex justify-center gap-3 mb-12" id="pinDisplay">
                    <div class="pin-dot w-5 h-5 rounded-full bg-slate-200"></div>
                    <div class="pin-dot w-5 h-5 rounded-full bg-slate-200"></div>
                    <div class="pin-dot w-5 h-5 rounded-full bg-slate-200"></div>
                    <div class="pin-dot w-5 h-5 rounded-full bg-slate-200"></div>
                </div>

                <!-- KEYPAD -->
                <div class="grid grid-cols-3 gap-3 mb-6 keypad">
                    <button onclick="addPin('1')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">1</button>
                    <button onclick="addPin('2')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">2</button>
                    <button onclick="addPin('3')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">3</button>
                    <button onclick="addPin('4')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">4</button>
                    <button onclick="addPin('5')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">5</button>
                    <button onclick="addPin('6')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">6</button>
                    <button onclick="addPin('7')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">7</button>
                    <button onclick="addPin('8')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">8</button>
                    <button onclick="addPin('9')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">9</button>
                    <button onclick="deletePin()" class="key-btn delete col-start-2 aspect-square bg-red-100 hover:bg-red-200 active:bg-red-300 text-red-700 font-semibold rounded-2xl transition-all active:scale-95">⌫</button>
                    <button onclick="addPin('0')" class="key-btn aspect-square bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-900 text-2xl font-semibold rounded-2xl transition-all active:scale-95">0</button>
                    <button onclick="clearPin()" class="key-btn delete aspect-square bg-orange-100 hover:bg-orange-200 active:bg-orange-300 text-orange-700 font-semibold rounded-2xl transition-all active:scale-95">C</button>
                </div>

                <!-- ERROR MESSAGE -->
                <div id="pinError" class="text-red-600 text-sm font-medium text-center h-6"></div>

                <input type="password" id="pinInput" class="pin-input">
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="appContainer" style="display: none;" class="app-container fixed inset-0 flex flex-col bg-white overflow-hidden">
        <!-- HEADER -->
        <header class="app-header bg-white border-b border-slate-200 px-4 py-4 md:px-6 md:py-5 flex items-center justify-between flex-shrink-0">
            <div>
                <h1 class="text-3xl md:text-4xl font-black text-slate-900 tracking-tight">Net Worth</h1>
                <p class="text-slate-500 text-sm mt-1">Assets & Liabilities Tracker</p>
            </div>
            <button onclick="logout()" class="logout-btn px-4 py-2 bg-slate-100 hover:bg-slate-200 active:bg-slate-300 text-slate-700 font-semibold rounded-lg transition-all active:scale-95 text-sm">Logout</button>
        </header>

        <!-- CONTENT -->
        <div class="app-content scrollable-content flex-1 w-full overflow-y-auto">
            <div class="max-w-4xl mx-auto px-4 md:px-6 py-6 md:py-8">
                
                <!-- SUMMARY CARDS -->
                <div class="summary-cards grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-6 mb-8 md:mb-10">
                    <!-- Assets Card -->
                    <div class="summary-card bg-slate-50 rounded-2xl p-4 md:p-6 border border-slate-200">
                        <div class="summary-card-label text-slate-600 text-xs md:text-sm font-semibold uppercase tracking-wide mb-2">Total Assets</div>
                        <div id="totalAssets" class="summary-card-value text-2xl md:text-4xl font-black text-slate-900 tracking-tight break-words">$0.00</div>
                    </div>

                    <!-- Liabilities Card -->
                    <div class="summary-card bg-slate-50 rounded-2xl p-4 md:p-6 border border-slate-200">
                        <div class="summary-card-label text-slate-600 text-xs md:text-sm font-semibold uppercase tracking-wide mb-2">Total Liabilities</div>
                        <div id="totalLiabilities" class="summary-card-value text-2xl md:text-4xl font-black text-slate-900 tracking-tight break-words">$0.00</div>
                    </div>

                    <!-- Net Worth Card -->
                    <div class="summary-card networth bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl p-4 md:p-6 border border-blue-400 col-span-1 md:col-span-3">
                        <div class="summary-card-label text-blue-100 text-xs md:text-sm font-semibold uppercase tracking-wide mb-2">Net Worth</div>
                        <div id="netWorth" class="summary-card-value text-2xl md:text-4xl font-black text-white tracking-tight break-words">$0.00</div>
                    </div>
                </div>

                <!-- ADD BUTTON -->
                <div class="mb-8 md:mb-10">
                    <button onclick="openModal()" class="add-btn w-full md:w-auto px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 active:from-blue-800 active:to-indigo-800 text-white font-bold rounded-xl transition-all active:scale-95 shadow-lg hover:shadow-xl">
                        ➕ Add Entry
                    </button>
                </div>

                <!-- ASSETS SECTION -->
                <div class="ledger-section mb-10">
                    <h3 class="text-2xl md:text-3xl font-bold text-slate-900 mb-4 tracking-tight">📈 Assets</h3>
                    <div id="assetsList"></div>
                </div>

                <!-- LIABILITIES SECTION -->
                <div class="ledger-section pb-8">
                    <h3 class="text-2xl md:text-3xl font-bold text-slate-900 mb-4 tracking-tight">📉 Liabilities</h3>
                    <div id="liabilitiesList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL -->
    <div id="addModal" class="modal fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-900">Add New Entry</h2>
                <button class="close-btn text-slate-400 hover:text-slate-600" onclick="closeModal()">✕</button>
            </div>

            <!-- MESSAGE -->
            <div id="message" class="mb-4 min-h-6"></div>

            <!-- FORM -->
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Name</label>
                    <input id="itemName" type="text" placeholder="e.g., House, Car, Student Loan" class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Amount</label>
                    <input id="itemAmount" type="number" placeholder="0.00" step="0.01" min="0" class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Type</label>
                    <select id="itemType" class="w-full px-4 py-2 border-2 border-slate-300 rounded-lg focus:border-blue-500 focus:outline-none transition-colors">
                        <option value="asset">Asset</option>
                        <option value="liability">Liability</option>
                    </select>
                </div>
            </div>

            <!-- BUTTONS -->
            <button onclick="addItemAndClose()" class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 active:from-blue-800 active:to-indigo-800 text-white font-semibold rounded-lg transition-all active:scale-95">Add Entry</button>
        </div>
    </div>

    <style>
        .modal {
            display: none !important;
        }

        .modal.active {
            display: flex !important;
        }

        .close-btn {
            font-size: 24px;
            transition: color 0.2s;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
        }

        .message.success {
            background: #d1f4d1;
            color: #166534;
            border: 1px solid #a6e4a6;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #9ca3af;
            font-size: 15px;
        }

        .ledger-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: white;
            border: 2px solid #e5e5ea;
            border-radius: 10px;
            margin-bottom: 8px;
            font-size: 15px;
        }

        .ledger-item.liability .ledger-amount {
            color: #d70015;
        }

        .ledger-name {
            font-weight: 500;
            color: #1d1d1f;
        }

        .ledger-amount {
            font-weight: 600;
            color: #0071e3;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .delete-btn {
            background: transparent;
            color: #d70015;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .delete-btn:hover {
            opacity: 1;
        }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATVgByZ97lJTZWv18FbCrAryPOXeO0JZ4",
            authDomain: "assets-8cc78.firebaseapp.com",
            projectId: "assets-8cc78",
            storageBucket: "assets-8cc78.appspot.com",
            messagingSenderId: "981433426082",
            appId: "1:981433426082:web:cb1c5e4c817b8fe8e4f7fb",
            measurementId: "G-NXZBRW1X1B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make functions global
        window.checkPin = checkPin;
        window.logout = logout;
        window.addItem = addItem;
        window.deleteItem = deleteItem;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.addItemAndClose = addItemAndClose;
        window.addPin = addPin;
        window.deletePin = deletePin;
        window.clearPin = clearPin;

        let isAuthenticated = false;
        let userItems = [];

        // MODAL FUNCTIONS
        function openModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('itemName').focus();
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            document.getElementById('itemType').value = 'asset';
        }

        function addItemAndClose() {
            addItem();
            if (!document.getElementById('message').textContent.includes('Error')) {
                closeModal();
            }
        }

        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // PIN FUNCTIONS
        function addPin(num) {
            const pinInput = document.getElementById('pinInput');
            if (pinInput.value.length < 4) {
                pinInput.value += num;
                updatePinDisplay();
                if (pinInput.value.length === 4) {
                    setTimeout(checkPin, 150);
                }
            }
        }

        function deletePin() {
            const pinInput = document.getElementById('pinInput');
            pinInput.value = pinInput.value.slice(0, -1);
            updatePinDisplay();
            document.getElementById('pinError').textContent = '';
        }

        function clearPin() {
            const pinInput = document.getElementById('pinInput');
            pinInput.value = '';
            updatePinDisplay();
            document.getElementById('pinError').textContent = '';
        }

        function updatePinDisplay() {
            const pinInput = document.getElementById('pinInput');
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < pinInput.value.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        async function checkPin() {
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pinError');
            const pin = pinInput.value;

            if (pin.length < 4) return;

            if (pin !== '3270') {
                pinError.textContent = 'Incorrect PIN';
                pinInput.value = '';
                updatePinDisplay();
                const display = document.getElementById('pinScreen');
                display.style.animation = 'shake 0.4s ease';
                setTimeout(() => {
                    display.style.animation = '';
                }, 400);
                return;
            }

            isAuthenticated = true;
            pinError.textContent = '';
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            loadItems();
        }

        // LOGOUT
        function logout() {
            isAuthenticated = false;
            document.getElementById('pinScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('pinInput').value = '';
            userItems = [];
            
            const assetsList = document.getElementById('assetsList');
            const liabilitiesList = document.getElementById('liabilitiesList');
            if(assetsList) assetsList.innerHTML = '';
            if(liabilitiesList) liabilitiesList.innerHTML = '';
        }

        // ADD ITEM
        async function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const amount = parseFloat(document.getElementById('itemAmount').value);
            const type = document.getElementById('itemType').value;
            const messageDiv = document.getElementById('message');

            if (!name || isNaN(amount) || amount < 0) {
                messageDiv.innerHTML = '<div class="message error">Please fill in all fields correctly</div>';
                return;
            }

            try {
                const docRef = await addDoc(collection(db, 'items'), {
                    name,
                    amount,
                    type,
                    timestamp: new Date(),
                    userId: 'default-user'
                });

                userItems.push({ id: docRef.id, name, amount, type });
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemAmount').value = '';
                messageDiv.innerHTML = '<div class="message success">✓ Entry added successfully</div>';
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 2000);

                updateUI();
            } catch (error) {
                messageDiv.innerHTML = '<div class="message error">Error adding entry. Try again.</div>';
                console.error('Error:', error);
            }
        }

        // DELETE ITEM
        async function deleteItem(id) {
            try {
                await deleteDoc(doc(db, 'items', id));
                userItems = userItems.filter(item => item.id !== id);
                updateUI();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // LOAD ITEMS
        async function loadItems() {
            try {
                const q = query(collection(db, 'items'), where('userId', '==', 'default-user'));
                const querySnapshot = await getDocs(q);
                userItems = [];
                querySnapshot.forEach((doc) => {
                    userItems.push({ id: doc.id, ...doc.data() });
                });
                updateUI();
            } catch (error) {
                console.error('Error loading items:', error);
            }
        }

        // UPDATE UI
        function updateUI() {
            const assetsList = document.getElementById('assetsList');
            const liabilitiesList = document.getElementById('liabilitiesList');
            
            // Filter and sort by amount (highest first)
            const assets = userItems
                .filter(item => item.type === 'asset')
                .sort((a, b) => b.amount - a.amount);
            const liabilities = userItems
                .filter(item => item.type === 'liability')
                .sort((a, b) => b.amount - a.amount);

            const totalAssets = assets.reduce((sum, item) => sum + item.amount, 0);
            const totalLiabilities = liabilities.reduce((sum, item) => sum + item.amount, 0);
            const netWorth = totalAssets - totalLiabilities;

            // Update summary
            document.getElementById('totalAssets').textContent = `$${totalAssets.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('totalLiabilities').textContent = `$${totalLiabilities.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('netWorth').textContent = `$${netWorth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            // Update assets list
            if (assets.length === 0) {
                assetsList.innerHTML = '<div class="empty-state">No assets yet</div>';
            } else {
                assetsList.innerHTML = assets.map(item => `
                    <div class="ledger-item">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }

            // Update liabilities list
            if (liabilities.length === 0) {
                liabilitiesList.innerHTML = '<div class="empty-state">No liabilities yet</div>';
            } else {
                liabilitiesList.innerHTML = liabilities.map(item => `
                    <div class="ledger-item liability">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Global Keyboard Support for PIN Screen
        document.addEventListener('keydown', function(e) {
            if (!isAuthenticated) {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    deletePin();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPin();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearPin();
                } else if (/^[0-9]$/.test(e.key)) {
                    e.preventDefault();
                    addPin(e.key);
                }
            }
        });

        // Modal keyboard events
        document.getElementById('itemName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('itemAmount').focus();
        });

        document.getElementById('itemAmount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItemAndClose();
        });

        // Escape key closes modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('addModal').classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
