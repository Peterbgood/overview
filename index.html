<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assets & Liabilities Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* PIN SCREEN */
        .pin-screen {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            padding: 60px 40px;
            width: 100%;
            max-width: 320px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .pin-screen {
                padding: 40px 20px;
                border-radius: 0;
                max-width: 100%;
                height: 100vh;
                display: flex;
                flex-direction: column;
                justify-content: center;
            }
        }

        .pin-screen h1 {
            font-size: 32px;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .pin-screen p {
            color: #86868b;
            margin-bottom: 40px;
            font-size: 15px;
            font-weight: 400;
            letter-spacing: -0.24px;
        }

        .pin-input-container {
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .pin-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #e5e5ea;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 0 2px white;
        }

        .pin-dot.filled {
            background: #1d1d1f;
            transform: scale(1.1);
        }

        .pin-input {
            display: none;
        }

        /* KEYPAD */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .keypad {
                gap: 10px;
            }

            .key-btn {
                font-size: 18px;
            }
        }

        .key-btn {
            aspect-ratio: 1;
            background: #f5f5f7;
            border: 1px solid #e5e5ea;
            border-radius: 14px;
            font-size: 20px;
            font-weight: 500;
            color: #1d1d1f;
            cursor: pointer;
            transition: all 0.1s ease;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .key-btn:active {
            background: #e8e8ed;
            transform: scale(0.95);
        }

        .key-btn:hover {
            background: #ececf1;
        }

        .key-btn.delete {
            font-size: 24px;
            color: #666;
        }

        .pin-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .action-btn {
            padding: 10px;
            border: 1px solid #e5e5ea;
            background: #f5f5f7;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            color: #1d1d1f;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .action-btn:hover {
            background: #ececf1;
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .pin-error {
            color: #d70015;
            font-size: 13px;
            margin-top: 12px;
            min-height: 18px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* MAIN APP */
        .app-container {
            display: none;
            background: white;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        .app-header {
            background: white;
            color: #1d1d1f;
            padding: 16px 20px;
            border-bottom: 1px solid #f5f5f7;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .app-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0;
            letter-spacing: -0.5px;
        }

        .logout-btn {
            background: #f5f5f7;
            color: #1d1d1f;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            font-family: inherit;
        }

        .logout-btn:hover {
            background: #ececf1;
        }

        .logout-btn:active {
            transform: scale(0.98);
        }

        .app-content {
            padding: 20px;
            display: block;
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            overflow-y: auto;
            flex: 1;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 6px;
            letter-spacing: -0.24px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e5e5ea;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.2s ease;
            background: white;
            color: #1d1d1f;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 2px rgba(0, 113, 227, 0.1);
        }

        .add-btn {
            background: linear-gradient(135deg, #0071e3 0%, #0077be 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
            font-family: inherit;
            letter-spacing: -0.24px;
        }

        .add-btn:hover {
            opacity: 0.95;
        }

        .add-btn:active {
            transform: scale(0.98);
        }

        .bottom-action-section {
            margin-top: 32px;
            padding-bottom: 32px;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
        }

        .modal-header {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: -0.4px;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            color: #86868b;
            cursor: pointer;
            padding: 0;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }

        .close-btn:hover {
            color: #1d1d1f;
        }

        /* LEDGER STYLING */
        .ledger-section {
            margin-bottom: 28px;
        }

        .ledger-section h3 {
            font-size: 17px;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 12px;
            letter-spacing: -0.4px;
        }

        .ledger-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f5f5f7;
            border-bottom: 1px solid white;
            font-size: 15px;
            border-radius: 10px;
            margin-bottom: 1px;
        }

        .ledger-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }

        .ledger-name {
            font-weight: 500;
            color: #1d1d1f;
            letter-spacing: -0.24px;
        }

        .ledger-amount {
            font-weight: 600;
            color: #0071e3;
            display: flex;
            gap: 12px;
            align-items: center;
            letter-spacing: -0.24px;
        }

        .ledger-item.liability .ledger-amount {
            color: #d70015;
        }

        /* SUMMARY CARDS */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        @media (max-width: 600px) {
            .summary-cards {
                grid-template-columns: 1fr;
            }
        }

        .summary-card {
            background: #f5f5f7;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            border: 1px solid #f5f5f7;
        }

        .summary-card-label {
            font-size: 12px;
            color: #86868b;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .summary-card-value {
            font-size: 26px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.5px;
        }

        .summary-card.networth {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #0071e3 0%, #0077be 100%);
            color: white;
        }

        .summary-card.networth .summary-card-label {
            color: rgba(255, 255, 255, 0.8);
        }

        .summary-card.networth .summary-card-value {
            color: white;
        }

        .delete-btn {
            background: transparent;
            color: #d70015;
            border: none;
            padding: 4px;
            cursor: pointer;
            font-size: 20px;
            font-weight: 300;
            transition: all 0.2s ease;
            opacity: 0.6;
        }

        .delete-btn:hover {
            opacity: 1;
            color: #991b1b;
        }

        .empty-state {
            text-align: center;
            padding: 20px;
            color: #86868b;
            font-size: 15px;
            letter-spacing: -0.24px;
        }

        .message {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
            letter-spacing: -0.24px;
        }

        .message.success {
            background: #d1f4d1;
            color: #166534;
            border: 1px solid #a6e4a6;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="pin-screen" id="pinScreen">
        <h1>Net Worth</h1>
        <p>Enter PIN to continue</p>
        <div class="pin-input-container" id="pinDisplay">
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
            <div class="pin-dot"></div>
        </div>
        <input type="password" id="pinInput" class="pin-input">
        
        <div class="keypad">
            <button class="key-btn" onclick="addPin('1')">1</button>
            <button class="key-btn" onclick="addPin('2')">2</button>
            <button class="key-btn" onclick="addPin('3')">3</button>
            <button class="key-btn" onclick="addPin('4')">4</button>
            <button class="key-btn" onclick="addPin('5')">5</button>
            <button class="key-btn" onclick="addPin('6')">6</button>
            <button class="key-btn" onclick="addPin('7')">7</button>
            <button class="key-btn" onclick="addPin('8')">8</button>
            <button class="key-btn" onclick="addPin('9')">9</button>
            <button class="key-btn delete" onclick="deletePin()">⌫</button>
            <button class="key-btn" onclick="addPin('0')">0</button>
            <button class="key-btn delete" onclick="clearPin()">C</button>
        </div>
        
        <div class="pin-error" id="pinError"></div>
    </div>

    <div class="app-container" id="appContainer">
        <button class="logout-btn" onclick="logout()">Logout</button>
        
        <div class="app-header">
            <h1>💰 Assets & Liabilities</h1>
            <p>Track your financial position</p>
        </div>

        <div class="app-content">
            <div class="summary-cards">
                <div class="summary-card assets">
                    <div class="summary-card-label">Total Assets</div>
                    <div class="summary-card-value" id="totalAssets">$0.00</div>
                </div>
                <div class="summary-card liabilities">
                    <div class="summary-card-label">Total Liabilities</div>
                    <div class="summary-card-value" id="totalLiabilities">$0.00</div>
                </div>
                <div class="summary-card networth" style="grid-column: 1 / -1;">
                    <div class="summary-card-label">Net Worth</div>
                    <div class="summary-card-value" id="netWorth">$0.00</div>
                </div>
            </div>

            <div id="message"></div>

            <div class="ledger-section">
                <h3>📈 Assets</h3>
                <div id="assetsList"></div>
            </div>

            <div class="ledger-section">
                <h3>📉 Liabilities</h3>
                <div id="liabilitiesList"></div>
            </div>
            
            <div class="bottom-action-section">
                <button class="add-btn" onclick="openModal()">➕ Add New Entry</button>
            </div>
        </div>

        <div class="modal" id="addModal">
            <div class="modal-content">
                <div class="modal-header">
                    <span>➕ Add Entry</span>
                    <button class="close-btn" onclick="closeModal()">✕</button>
                </div>

                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="itemName" placeholder="e.g., Savings Account">
                </div>

                <div class="form-group">
                    <label>Amount ($)</label>
                    <input type="number" id="itemAmount" placeholder="0.00" step="0.01" min="0">
                </div>

                <div class="form-group">
                    <label>Type</label>
                    <select id="itemType">
                        <option value="asset">Asset</option>
                        <option value="liability">Liability</option>
                    </select>
                </div>

                <button class="add-btn" onclick="addItemAndClose()">Add Entry</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyATVgByZ97lJTZWv18FbCrAryPOXeO0JZ4",
            authDomain: "assets-8cc78.firebaseapp.com",
            projectId: "assets-8cc78",
            storageBucket: "assets-8cc78.firebasestorage.app",
            messagingSenderId: "981433426082",
            appId: "1:981433426082:web:cb1c5e4c817b8fe8e4f7fb",
            measurementId: "G-NXZBRW1X1B"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Make functions global
        window.checkPin = checkPin;
        window.logout = logout;
        window.addItem = addItem;
        window.deleteItem = deleteItem;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.addItemAndClose = addItemAndClose;
        window.addPin = addPin;
        window.deletePin = deletePin;
        window.clearPin = clearPin;

        let isAuthenticated = false;
        let userItems = [];

        // MODAL FUNCTIONS
        function openModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('itemName').focus();
        }

        function closeModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            document.getElementById('itemType').value = 'asset';
        }

        function addItemAndClose() {
            addItem();
            if (!document.getElementById('message').textContent.includes('Error')) {
                closeModal();
            }
        }

        // Close modal when clicking outside
        document.getElementById('addModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // PIN FUNCTIONS
        function addPin(num) {
            const pinInput = document.getElementById('pinInput');
            if (pinInput.value.length < 4) {
                pinInput.value += num;
                updatePinDisplay();
                if (pinInput.value.length === 4) {
                    setTimeout(checkPin, 150);
                }
            }
        }

        function deletePin() {
            const pinInput = document.getElementById('pinInput');
            pinInput.value = pinInput.value.slice(0, -1);
            updatePinDisplay();
            document.getElementById('pinError').textContent = '';
        }

        function clearPin() {
            const pinInput = document.getElementById('pinInput');
            pinInput.value = '';
            updatePinDisplay();
            document.getElementById('pinError').textContent = '';
        }

        function updatePinDisplay() {
            const pinInput = document.getElementById('pinInput');
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                if (index < pinInput.value.length) {
                    dot.classList.add('filled');
                } else {
                    dot.classList.remove('filled');
                }
            });
        }

        async function checkPin() {
            const pinInput = document.getElementById('pinInput');
            const pinError = document.getElementById('pinError');
            const pin = pinInput.value;

            if (pin.length < 4) return;

            if (pin !== '3270') {
                pinError.textContent = 'Incorrect PIN';
                pinInput.value = '';
                updatePinDisplay();
                const display = document.getElementById('pinScreen');
                display.style.animation = 'shake 0.4s ease';
                setTimeout(() => {
                    display.style.animation = '';
                }, 400);
                return;
            }

            isAuthenticated = true;
            pinError.textContent = '';
            document.getElementById('pinScreen').style.display = 'none';
            document.getElementById('appContainer').style.display = 'flex';
            loadItems();
        }

        // LOGOUT
        function logout() {
            isAuthenticated = false;
            document.getElementById('pinScreen').style.display = 'flex';
            document.getElementById('appContainer').style.display = 'none';
            document.getElementById('pinInput').value = '';
            userItems = [];
            
            const assetsList = document.getElementById('assetsList');
            const liabilitiesList = document.getElementById('liabilitiesList');
            if(assetsList) assetsList.innerHTML = '';
            if(liabilitiesList) liabilitiesList.innerHTML = '';
        }

        // ADD ITEM
        async function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const amount = parseFloat(document.getElementById('itemAmount').value);
            const type = document.getElementById('itemType').value;
            const messageDiv = document.getElementById('message');

            if (!name || isNaN(amount) || amount < 0) {
                messageDiv.innerHTML = '<div class="message error">Please fill in all fields correctly</div>';
                return;
            }

            try {
                const docRef = await addDoc(collection(db, 'items'), {
                    name,
                    amount,
                    type,
                    timestamp: new Date(),
                    userId: 'default-user' // Using default user since no auth
                });

                userItems.push({ id: docRef.id, name, amount, type });
                
                document.getElementById('itemName').value = '';
                document.getElementById('itemAmount').value = '';
                messageDiv.innerHTML = '<div class="message success">✓ Entry added successfully</div>';
                
                setTimeout(() => {
                    messageDiv.innerHTML = '';
                }, 2000);

                updateUI();
            } catch (error) {
                messageDiv.innerHTML = '<div class="message error">Error adding entry. Try again.</div>';
                console.error('Error:', error);
            }
        }

        // DELETE ITEM
        async function deleteItem(id) {
            try {
                await deleteDoc(doc(db, 'items', id));
                userItems = userItems.filter(item => item.id !== id);
                updateUI();
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // LOAD ITEMS
        async function loadItems() {
            try {
                const q = query(collection(db, 'items'), where('userId', '==', 'default-user'));
                const querySnapshot = await getDocs(q);
                userItems = [];
                querySnapshot.forEach((doc) => {
                    userItems.push({ id: doc.id, ...doc.data() });
                });
                updateUI();
            } catch (error) {
                console.error('Error loading items:', error);
            }
        }

        // UPDATE UI
        function updateUI() {
            const assetsList = document.getElementById('assetsList');
            const liabilitiesList = document.getElementById('liabilitiesList');
            
            // Filter and sort by amount (highest first)
            const assets = userItems
                .filter(item => item.type === 'asset')
                .sort((a, b) => b.amount - a.amount);
            const liabilities = userItems
                .filter(item => item.type === 'liability')
                .sort((a, b) => b.amount - a.amount);

            const totalAssets = assets.reduce((sum, item) => sum + item.amount, 0);
            const totalLiabilities = liabilities.reduce((sum, item) => sum + item.amount, 0);
            const netWorth = totalAssets - totalLiabilities;

            // Update summary
            document.getElementById('totalAssets').textContent = `$${totalAssets.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('totalLiabilities').textContent = `$${totalLiabilities.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            document.getElementById('netWorth').textContent = `$${netWorth.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;

            // Update assets list
            if (assets.length === 0) {
                assetsList.innerHTML = '<div class="empty-state">No assets yet</div>';
            } else {
                assetsList.innerHTML = assets.map(item => `
                    <div class="ledger-item">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }

            // Update liabilities list
            if (liabilities.length === 0) {
                liabilitiesList.innerHTML = '<div class="empty-state">No liabilities yet</div>';
            } else {
                liabilitiesList.innerHTML = liabilities.map(item => `
                    <div class="ledger-item liability">
                        <span class="ledger-name">${item.name}</span>
                        <div class="ledger-amount">
                            <span>$${item.amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}</span>
                            <button class="delete-btn" onclick="deleteItem('${item.id}')">×</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Global Keyboard Support for PIN Screen
        document.addEventListener('keydown', function(e) {
            // Only capture input if the user is not authenticated (meaning they are on the PIN screen)
            if (!isAuthenticated) {
                if (e.key === 'Backspace') {
                    e.preventDefault();
                    deletePin();
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    checkPin();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    clearPin();
                } else if (/^[0-9]$/.test(e.key)) {
                    e.preventDefault();
                    addPin(e.key);
                }
            }
        });

        // Modal keyboard events
        document.getElementById('itemName').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('itemAmount').focus();
        });

        document.getElementById('itemAmount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItemAndClose();
        });

        // Escape key closes modal
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('addModal').classList.contains('active')) {
                closeModal();
            }
        });
    </script>
</body>
</html>
